server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy les appels API vers le backend (fallback quand VITE_API_URL n'est pas injecté au build)
    # Permet de gérer les requêtes POST/PATCH/DELETE qui causaient les 405
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA routing : toutes les routes inconnues renvoient index.html pour React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
